services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riskiq}
      POSTGRES_USER: ${POSTGRES_USER:-riskiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../platform/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riskiq} -d ${POSTGRES_DB:-riskiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    env_file: .env.vps
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-riskiq}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-riskiq}
      FOLLOWUP_SCHEDULER_INTERVAL_SECONDS: ${FOLLOWUP_SCHEDULER_INTERVAL_SECONDS:-300}
    volumes:
      - app_db:/app/platform/db
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    env_file: .env.vps
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-riskiq}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-riskiq}
      FOLLOWUP_SCHEDULER_INTERVAL_SECONDS: ${FOLLOWUP_SCHEDULER_INTERVAL_SECONDS:-300}
    volumes:
      - app_db:/app/platform/db
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: .env.vps
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  postgres_data:
  app_db:
  caddy_data:
  caddy_config:
